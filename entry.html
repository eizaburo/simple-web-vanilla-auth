<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>エントリー</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <header>
        header
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="mypage.html">MyPage</a></li>
            <li><a href="login.html">Login</a></li>
        </ul>
    </header>
    <main>
        <section class="common_section">
            <h1 style=>エントリーページ</h1>
            <form class="entry_form">
                <label for="email">Email</label>
                <input type="text" id="email">

                <label for="password">パスワード</label>
                <input type="text" id="password">

                <label for="full_name">氏名</label>
                <input type="text" id="full_name">

                <label for="phone_no">携帯電話番号</label>
                <input type="text" id="phone_no">

                <button type="button" id="entry_button" style="margin: 30px 0;">登録する</button>
            </form>
        </section>
    </main>
    <footer>
        footer
    </footer>
    <script>

        // 基本要素の取得
        const email = document.getElementById("email");
        const password = document.getElementById("password");
        const full_name = document.getElementById("full_name");
        const phone_no = document.getElementById("phone_no");
        const entry_button = document.getElementById("entry_button");

        // buttonのクリックイベント
        entry_button.addEventListener("click", (e) => {
            e.preventDefault();

            //サンプル処理
            alert(`email=${email.value}, password=${password.value}, full_name=${full_name.value}, phone_no=${phone_no.value}`)
        });

    </script>
</body>

</html>
